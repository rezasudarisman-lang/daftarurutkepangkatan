<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal DUK SMAN 1 SUKABUMI KOTA SUKABUMI</title>
<style>
  /* --- CSS TETAP SAMA SEPERTI SEBELUMNYA (RESPONSIF & RAPI) --- */
  body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
  .navbar { background-color: #1e1e1e; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
  .logo { font-size: 1.5rem; font-weight: 900; color: #fff; text-decoration: none; }
  .logo span { color: #f39c12; }
  .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
  .banner { background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); border-radius: 12px; padding: 40px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
  .banner-text h2 { margin: 0; font-size: 2rem; color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
  
  /* Desain Kartu */
  .card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; min-height: 460px; transition: 0.3s; }
  .card:hover { transform: translateY(-5px); border-color: #f39c12; }
  .card-img { width: 100%; height: 220px; object-fit: cover; background-color: #2a2a2a; }
  .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
  .nip { font-size: 0.9rem; color: #888; }
  .nama { font-size: 1.1rem; font-weight: 700; color: #fff; margin: 5px 0 15px 0; min-height: 3em; }
  .pangkat-wrapper { margin-top: auto; background-color: #181818; padding: 12px; border-radius: 6px; border: 1px solid #2a2a2a; min-height: 85px; }
  .golongan { font-size: 1rem; font-weight: 800; color: #f39c12; min-height: 2.6em; display: block; }
  .badge-container { display: flex; gap: 5px; margin-top: 10px; }
  .badge-tmt, .badge-mapel { font-size: 0.7rem; font-weight: bold; padding: 4px 6px; border-radius: 4px; color: #fff; white-space: nowrap; }
  .badge-tmt { background-color: #e74c3c; }
  .badge-mapel { background-color: #2980b9; }
  /*modif*/
  .category-scroll {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
    overflow-x: auto;
    padding-bottom: 10px;
  }
  .category-scroll::-webkit-scrollbar {
    height: 6px;
  }
  .category-scroll::-webkit-scrollbar-thumb {
    background-color: #333;
    border-radius: 10px;
  }
  .cat-btn {
    background-color: #1e1e1e;
    color: #ddd;
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid #333;
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.3s;
  }
  .cat-btn:hover, .cat-btn.active {
    background-color: #f39c12;
    color: #fff;
    border-color: #f39c12;
  }
  .section-title {
    font-size: 1.3rem;
    margin-bottom: 20px;
    border-left: 4px solid #f39c12;
    padding-left: 10px;
    color: #fff;
  }
  /* Animasi Loading */
  #loading { text-align: center; font-size: 1.2rem; color: #f39c12; margin: 50px; }
</style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="logo">Portal<span>DUK</span></a>
  <div class="search-container" style="margin-bottom: 20px;">
  <input type="text" id="search-input" placeholder="Cari nama pegawai atau NIP..." 
         style="width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
  </div>
  </nav>

  <div class="container">
    <div class="banner">
      <div class="banner-text">
        <h2>Daftar Urut Kepangkatan</h2>
      </div>
    </div>
        <div class="category-scroll">
      <button class="cat-btn active">Semua Golongan</button>
      <button class="cat-btn">Golongan I</button>
      <button class="cat-btn">Golongan II</button>
      <button class="cat-btn">Golongan III</button>
      <button class="cat-btn">Golongan IV</button>
    </div>
    <h3 class="section-title">Daftar Pegawai Terbaru</h3>
    <div id="loading">Memuat data pegawai...</div>
    <div class="grid" id="grid-pegawai">
      </div>
  </div>

  <script>
    // GANTI LINK DI BAWAH INI DENGAN LINK WEB APP ANDA
   // Simpan scriptURL Anda
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwiRIKpc4292caZhm3l9GBCBup4DHBdDgvR-VgX5wojFzAq99HHeLQYak61hwYtE8PH/exec';
  let allData = [];

  async function loadData() {
    try {
      const response = await fetch(scriptURL);
      allData = await response.json();
      renderData(allData);
      const loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
      setupFilters();
    } catch (error) {
      console.error('Error:', error);
      if (document.getElementById('loading')) {
        document.getElementById('loading').innerText = 'Gagal memuat data.';
      }
    }
  }

  function renderData(data) {
    const grid = document.getElementById('grid-pegawai');
    if (!grid) return;
    grid.innerHTML = data.map(p => `
      <div class="card">
        <img src="${p.Foto || 'https://via.placeholder.com/400'}" class="card-img" alt="Foto">
        <div class="card-body">
          <div class="nip">NIP. ${p.NIP}</div>
          <h2 class="nama">${p.Nama}</h2>
          <div class="pangkat-wrapper">
            <span class="golongan">${p.Pangkat} (${p.Golongan})</span>
            <div class="badge-container">
              <span class="badge-tmt">TMT: ${p.TMT}</span>
              <span class="badge-mapel">${p.Mapel}</span>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function setupFilters() {
    const buttons = document.querySelectorAll('.cat-btn');
    buttons.forEach(button => {
      button.onclick = function() {
        // Pindahkan class active
        const currentActive = document.querySelector('.cat-btn.active');
        if (currentActive) currentActive.classList.remove('active');
        this.classList.add('active');
        
        const text = this.innerText.trim();
        if (text === "Semua Golongan") {
          renderData(allData);
          return;
        }

        // Ambil "I", "II", "III", atau "IV" dari teks tombol
        const targetRomawi = text.replace('Golongan ', '').trim();
        
        // Filter dengan logika pemisahan tanda miring (/)
        const filtered = allData.filter(p => {
          if (!p.Golongan) return false;
          // Memastikan "IV/c" dipotong menjadi "IV" saja sebelum dicek
          const romanFromData = p.Golongan.split('/')[0].trim();
          return romanFromData === targetRomawi;
        });
        
        renderData(filtered);
      };
    });
  }

  loadData();
  </script>

</body>
</html>
