<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal DUK - Kategori Filter</title>
<style>
  /* --- BASE STYLE --- */
  body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
  
  /* --- NAVBAR (Pencarian Dihapus) --- */
  .navbar { 
    background-color: #1e1e1e; padding: 15px 5%; display: flex; justify-content: flex-start; 
    align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; 
  }
  .logo { font-size: 1.5rem; font-weight: 900; color: #fff; text-decoration: none; }
  .logo span { color: #f39c12; }

  .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }

  /* --- BANNER & LOGO --- */
  .banner { 
    background: linear-gradient(135deg, #2c3e50 0%, #1a1a1a 100%); 
    border-radius: 12px; padding: 25px; margin-bottom: 30px; 
    display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; 
  }
  .banner-text h2 { margin: 0; font-size: 1.5rem; color: #fff; }
  .logo-instansi { width: 60px; height: 60px; object-fit: contain; }

  /* --- CATEGORY FILTER --- */
  .category-scroll {
    display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px;
  }
  .category-scroll::-webkit-scrollbar { height: 4px; }
  .category-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
  
  .cat-btn {
    background: #1e1e1e; color: #bbb; padding: 8px 18px; border-radius: 20px;
    border: 1px solid #333; cursor: pointer; white-space: nowrap; font-size: 0.85rem; font-weight: 600;
  }
  .cat-btn.active { background: #f39c12; color: #fff; border-color: #f39c12; }

  /* --- GRID PEGAWAI --- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
  .card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; min-height: auto; transition: 0.3s; }
  .card:hover { transform: translateY(-5px); border-color: #f39c12; }
  .card-img { width: 100%; height: 200px; object-fit: cover; background-color: #2a2a2a; }
  .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
  .nama { font-size: 1rem; font-weight: 700; color: #fff; margin: 5px 0 10px 0; min-height: 2.8em; }
  .pangkat-wrapper { margin-top: auto; background-color: #181818; padding: 12px; border-radius: 6px; border: 1px solid #2a2a2a; }
  .golongan-text { font-size: 0.9rem; font-weight: 800; color: #f39c12; display: block; margin-bottom: 8px; }
  .badge-container { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge { font-size: 0.65rem; font-weight: bold; padding: 3px 6px; border-radius: 4px; color: #fff; }
  .badge-tmt { background-color: #e74c3c; }
  .badge-mapel { background-color: #2980b9; }

  #loading { text-align: center; color: #f39c12; margin: 40px; font-weight: bold; }

  @media (max-width: 768px) {
    .navbar { justify-content: center; padding: 15px; }
    .banner { flex-direction: column; text-align: center; gap: 15px; }
  }
</style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="logo">Portal<span>DUK</span></a>
  </nav>

  <div class="container">
    
    <div class="banner">
      <div class="banner-text">
        <h2 id="instansiName">Daftar Urut Kepangkatan</h2>
        <p style="font-size: 0.9rem; color: #888; margin-top: 5px;">Data Kepegawaian Real-time</p>
      </div>
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhqDZC1BfZwyWX3jZitY14xuvw7LI6p5DBWdGdpvsFh6iPiBoDIYncByJ0KiWMdWtJLpgrYIrUFIh-gBpnvDm6ng_oV5RO1IgoVBmlXHzQOT-oN6Qah33aMs2dZFqdpXMbLaYWEZJdto87JFGhWmrT_7pGjuzBeBA019KBJLx3emFCAXC4gkTEiBWqm_HQ/s2048/Logo%20SMAN%201%20Sukabumi.webp" alt="Logo" class="logo-instansi">
    </div>

    <div class="category-scroll" id="categoryFilter">
      <button class="cat-btn active" data-filter="all">Semua</button>
      <button class="cat-btn" data-filter="madya">Guru Madya</button>
      <button class="cat-btn" data-filter="muda">Guru Muda</button>
      <button class="cat-btn" data-filter="pertama">Guru Pertama</button>
      <button class="cat-btn" data-filter="pppk">PPPK</button>
      <button class="cat-btn" data-filter="pppk-guru">PPPK PW Guru</button>
      <button class="cat-btn" data-filter="pppk-tu">PPPK PW TU</button>
    </div>

    <div id="loading">Menghubungkan ke Google Sheets...</div>
    <div class="grid" id="grid-pegawai"></div>

  </div>

  <script>
    // MASUKKAN URL APPS SCRIPT ANDA DI SINI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyl912IqtnM29BE6N_Ojzk4KO6MwswjAWLmqDvdBpk1bhvtt0lqENR5nTM93Ekw6ka-/exec';
    
    let allData = []; 

    async function fetchData() {
      try {
        const response = await fetch(scriptURL);
        allData = await response.json();
        renderCards(allData);
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        document.getElementById('loading').innerText = 'Gagal memuat data.';
      }
    }

    function renderCards(data, category = 'all') {
      const grid = document.getElementById('grid-pegawai');
      let html = '';

      if (data.length === 0) {
        grid.innerHTML = '<p style="text-align:center; width:100%; color:#888;">Data tidak ditemukan.</p>';
        return;
      }

      data.forEach(p => {
        let labelMapel = "Mapel";
        if (category === 'pppk-tu' || p.Pangkat.includes("PW TU")) {
          labelMapel = "Jabatan";
        }

        let fotoUrl = (p.Foto && p.Foto.trim() !== "") ? p.Foto : 'https://via.placeholder.com/400x400/2a2a2a/f39c12?text=No+Image';

        html += `
          <div class="card">
            <img src="${fotoUrl}" class="card-img" alt="Foto">
            <div class="card-body">
              <div style="font-size: 0.75rem; color: #888;">NIP. ${p.NIP}</div>
              <h2 class="nama">${p.Nama}</h2>
              <div class="pangkat-wrapper">
                <span class="golongan-text">${p.Pangkat} (${p.Golongan})</span>
                <div class="badge-container">
                  <span class="badge badge-tmt">TMT: ${p.TMT}</span>
                  <span class="badge badge-mapel">${labelMapel}: ${p.Mapel}</span>
                </div>
              </div>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    // LOGIKA FILTER
    document.getElementById('categoryFilter').addEventListener('click', (e) => {
      if (!e.target.classList.contains('cat-btn')) return;

      document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
      e.target.classList.add('active');

      const filter = e.target.getAttribute('data-filter');
      let filtered = [];

      switch(filter) {
        case 'madya':
          filtered = allData.filter(p => ['IV/a', 'IV/b', 'IV/c'].includes(p.Golongan));
          break;
        case 'muda':
          filtered = allData.filter(p => ['III/c', 'III/d'].includes(p.Golongan));
          break;
        case 'pertama':
          filtered = allData.filter(p => ['III/a', 'III/b'].includes(p.Golongan));
          break;
        case 'pppk':
          filtered = allData.filter(p => p.Golongan.includes("Guru Ahli Pertama"));
          break;
        case 'pppk-guru':
          filtered = allData.filter(p => p.Pangkat.includes("PPPK PW Guru") && p.Golongan.includes("Ahli pertama"));
          break;
        case 'pppk-tu':
          filtered = allData.filter(p => p.Pangkat.includes("PPPK PW TU"));
          filtered.sort((a, b) => a.Mapel.localeCompare(b.Mapel));
          break;
        default:
          filtered = allData;
      }
      renderCards(filtered, filter);
    });

    fetchData();
  </script>
</body>
</html>
